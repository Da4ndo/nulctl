name: Bug report
description: Something is broken in nulctl (TUI, commands, CLI flags, API calls, SSH, or connection/UX bugs)
title: "[Bug - nulctl]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in **nulctl** (the CLI). Agent/daemon/server issues belong in
        [nulnet/nulnet](https://github.com/nulnet/nulnet/issues/new/choose).

  - type: input
    id: version
    attributes:
      label: nulctl version
      description: Output of `nulctl --version` or the release/built tag you installed
      placeholder: e.g. 0.5.4
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: How was nulctl installed?
      options:
        - Downloaded binary from GitHub Releases
        - Built from source (cargo build)
        - Homebrew
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, shell, and relevant details (e.g. terminal, SSH, TTY, config location)
      placeholder: |
        e.g. Ubuntu 22.04, x86_64, bash, ~/.config/nulctl/identity.key present
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug (what you did, what you expected)
      placeholder: |
        1. Download nulctl …
        2. Run nulctl -t user@host …
        3. Observe error …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Output / logs / errors (if any)
      description: Paste any relevant CLI output, Rust panics, stack traces. Redact secrets (identity.key, agent keys).
      render: shell
      placeholder: |
        nulctl --version
        nulctl -t localhost telemetry
        # (Copy-paste the output or error message)
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Local config (optional)
      description: Redact Ed25519 `identity.key`/`allowed_keys` if needed. Include e.g. `~/.config/nulctl/history.json`.
      render: json
    validations:
      required: false

  - type: textarea
    id: agent_version
    attributes:
      label: Agent version and install method (optional)
      description: Downstream bugs may also require this: output of `nulnet --version` or the deployed release/tag (if you know it)
      placeholder: |
        1.3.2 (from GitHub Releases)
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I redacted sensitive values from logs and config
          required: true
